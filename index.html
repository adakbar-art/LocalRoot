<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRoot Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-local-purple { background-color: #6B21A8; }
        .text-local-purple { color: #6B21A8; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    
    <header class="bg-local-purple text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-3xl font-bold">LocalRoot</h1>
        <a href="/admin.html" class="text-sm underline hover:text-gray-200">Admin Dashboard</a>
    </header>

    <main class="max-w-6xl mx-auto mt-8 p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Fresh Local Produce</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="products-grid">
                </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md h-fit sticky top-4 border border-gray-100">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Your Cart</h2>
            <ul id="cart-items" class="mb-4 text-gray-600 min-h-[60px] space-y-2">
                <li>Your cart is empty.</li>
            </ul>
            <div class="border-t pt-4 flex justify-between items-center font-bold text-lg mb-4 text-gray-800">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button id="checkout-btn" onclick="placeOrder()" class="w-full bg-local-purple text-white py-3 rounded-md hover:bg-purple-800 transition font-semibold shadow-sm">
                Checkout
            </button>
        </div>
        
    </main>

    <script>
        // Your Products Inventory
        const products = [
            { id: 1, name: "Organic Beets", price: 4.99, icon: "🍠" },
            { id: 2, name: "Fresh Carrots", price: 3.49, icon: "🥕" },
            { id: 3, name: "Local Honey", price: 8.99, icon: "🍯" },
            { id: 4, name: "Free-Range Eggs", price: 5.99, icon: "🥚" }
        ];

        let cart = [];
        let cartTotal = 0;

        // Display the products on the page
        function loadProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = ''; // Clear loading state
            
            products.forEach(product => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 flex flex-col items-center hover:shadow-md transition">
                        <div class="text-6xl mb-4">${product.icon}</div>
                        <h3 class="font-semibold text-xl text-gray-800 mb-1">${product.name}</h3>
                        <p class="text-local-purple font-bold mb-4 text-lg">$${product.price.toFixed(2)}</p>
                        <button onclick="addToCart('${product.name}', ${product.price})" class="bg-gray-100 text-gray-800 px-4 py-2 rounded hover:bg-gray-200 transition w-full font-medium">Add to Cart</button>
                    </div>
                `;
            });
        }

        // Add item to cart logic
        function addToCart(name, price) {
            cart.push({ name, price });
            cartTotal += price;
            updateCartUI();
        }

        // Update the cart visually
        function updateCartUI() {
            const cartList = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartList.innerHTML = '<li>Your cart is empty.</li>';
            } else {
                cartList.innerHTML = cart.map(item => 
                    `<li class="flex justify-between items-center border-b border-gray-50 pb-1">
                        <span>${item.name}</span>
                        <span class="font-medium">$${item.price.toFixed(2)}</span>
                    </li>`
                ).join('');
            }
            
            totalDisplay.innerText = '$' + cartTotal.toFixed(2);
        }

        // 🚀 NEW: Place Order to Netlify & MongoDB
        async function placeOrder() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            // Change button state to show it is working
            const btn = document.getElementById('checkout-btn');
            btn.innerText = "Processing Order...";
            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");

            const orderData = {
                items: cart,
                total: cartTotal
            };

            try {
                // Send the data to your Netlify serverless function
                const response = await fetch('/.netlify/functions/placeOrder', {
                    method: 'POST',
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    alert("Order placed successfully! We have received your request.");
                    cart = []; // Empty the cart
                    cartTotal = 0; // Reset total
                    updateCartUI(); // Refresh the display
                } else {
                    alert("There was an issue placing your order. Please try again.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to connect to the server.");
            } finally {
                // Reset the checkout button
                btn.innerText = "Checkout";
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        // Initialize the store when the page loads
        loadProducts();
    </script>
</body>
</html>
